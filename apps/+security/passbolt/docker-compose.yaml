---
services:
  passbolt:
    image: passbolt/passbolt:latest-ce
    container_name: passbolt
    restart: unless-stopped
    ports:
      - 8443:443
      - 8082:80
    environment:
      - APP_FULL_BASE_URL=${APP_FULL_BASE_URL}
      - DATASOURCES_DEFAULT_DRIVER=Cake\Database\Driver\Postgres
      - DATASOURCES_DEFAULT_ENCODING=utf8
      - DATASOURCES_DEFAULT_URL=${DATASOURCES_DEFAULT_URL}
      - EMAIL_TRANSPORT_DEFAULT_HOST=smtp.google.com
      - EMAIL_TRANSPORT_DEFAULT_PORT=587
      - EMAIL_TRANSPORT_DEFAULT_USERNAME=${EMAIL_TRANSPORT_DEFAULT_USERNAME}
      - EMAIL_TRANSPORT_DEFAULT_PASSWORD=${EMAIL_TRANSPORT_DEFAULT_PASSWORD}
      - EMAIL_TRANSPORT_DEFAULT_TLS=true
      - EMAIL_DEFAULT_FROM=${EMAIL_DEFAULT_FROM}
    security_opt:
      - no-new-privileges=true
    volumes:
      - ./gpg:/etc/passbolt/gpg
      - ./jwt:/etc/passbolt/jwt
    env_file:
      - .env
    command: ["/usr/bin/wait-for.sh", "-t", "0", "postgres_ip:5432", "--", "/docker-entrypoint.sh"]
    networks:
      - proxy
volumes:
  gpg: null
  jwt: null
networks:
  proxy:
    external: true