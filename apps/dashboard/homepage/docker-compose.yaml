---
services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - HOMEPAGE_ALLOWED_HOSTS=*
      - HOMEPAGE_VAR_API_SECRET=${HOMEPAGE_VAR_API_SECRET}
    security_opt:
      - no-new-privileges=true
    env_file:
      - .env
    volumes:
      - /home/homepage:/app/config
      - /home/homepage/images:/app/public/images
      - /home/homepage/icons:/app/public/icons
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - frontend

networks:
  frontend:
    external: true
