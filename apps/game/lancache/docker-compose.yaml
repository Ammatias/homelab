services:
  lancache_dns:
    image: lancachenet/lancache-dns:latest
    container_name: lancache_dns
    restart: unless-stopped
    ports:
      - ${DNS_BIND_IP}:53:53/udp
      - ${DNS_BIND_IP}:53:53/tcp
    security_opt:
      - no-new-privileges=true
    env_file: .env
    networks:
      - backend

  monolithic:
    image: lancachenet/monolithic:latest
    container_name: lancache_monolithic
    restart: unless-stopped
    ports:
      - 80:80/tcp
      - 443:443/tcp
    volumes:
      - /mnt/cache:/data/cache
      - /home/lancache/logs:/data/logs
    security_opt:
      - no-new-privileges=true
    env_file: .env
    networks:
      - backend

networks:
  backend:
    external: true