services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand
    restart: unless-stopped
    ports:
      - 3000:3000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - DATABASE_URL=${DATABASE_URL}
    security_opt:
      - no-new-privileges=true
    networks:
      - frontend

networks:
  frontend:
    external: true