services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - /home/postgres/data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges=true
    env_file:
      - .env
    networks:
      - backend

networks:
  backend:
    external: true