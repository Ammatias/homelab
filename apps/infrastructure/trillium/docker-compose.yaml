services:
  trilium:
    container_name: trilium
    image: triliumnext/trilium:latest
    restart: unless-stopped
    ports:
      - 8080:8080
    environment:
      TRILIUM_NETWORK_TRUSTEDREVERSEPROXY: 172.18.0.0/16
      TRILIUM_DATA_DIR: /home/node/trilium-data
      TZ: Asia/Yekaterinburg
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHBASEURL: ${TRILIUM_BASE_URL}
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTID: ${TRILIUM_CLIENT_ID}
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHCLIENTSECRET: ${TRILIUM_CLIENT_SECRET}
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHISSUERBASEURL: ${TRILIUM_ISSUER_BASE_URL}
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHISSUERNAME: ${TRILIUM_ISSUER_NAME}
      TRILIUM_MULTIFACTORAUTHENTICATION_OAUTHISSUERICON: "https://cdn.jsdelivr.net/gh/selfhst/icons/svg/authentik.svg"
    volumes:
      - /home/trilium:/home/node/trilium-data
    security_opt:
      - no-new-privileges=true
    networks:
      - frontend
      - backend

networks:
  frontend:
    external: true
  backend:
    external: true