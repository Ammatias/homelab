services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /home/jellyfin/config:/config
      - /home/jellyfin/cache:/cache
      - /mnt/media:/media
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [ gpu ]
    networks:
      - frontend

networks:
  frontend:
    external: true