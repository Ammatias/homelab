services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "0"
    restart: unless-stopped
    ports:
      - 3002:3000
    volumes:
      - /home/grafana/data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_GENERIC_OAUTH_ENABLED=${OAUTH_ENABLED}
      - GF_AUTH_GENERIC_OAUTH_NAME=${OAUTH_NAME}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - GF_AUTH_GENERIC_OAUTH_SCOPES=${OAUTH_SCOPES}
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=${OAUTH_AUTH_URL}
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=${OAUTH_TOKEN_URL}
      - GF_AUTH_GENERIC_OAUTH_API_URL=${OAUTH_API_URL}
      - GF_AUTH_SIGNOUT_REDIRECT_URL=${SIGNOUT_REDIRECT_URL}
      - GF_AUTH_OAUTH_AUTO_LOGIN=${OAUTH_AUTO_LOGIN}
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=${OAUTH_ROLE_ATTRIBUTE_PATH}
      - GF_SERVER_ROOT_URL=${ROOT_URL}
    security_opt:
      - no-new-privileges=true
    env_file:
      - .env
    networks:
      - frontend
      - backend

networks:
  frontend:
    external: true
  backend:
    external: true