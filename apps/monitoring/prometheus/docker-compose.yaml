services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - 9090:9090
    volumes:
      - /home/prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/prometheus/data:/prometheus
    security_opt:
      - no-new-privileges=true
    networks:
      - backend

networks:
  backend:
    external: true